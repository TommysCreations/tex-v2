# Pre-commit hooks for TEX v2.
#
# PR 1 shipped gitleaks + hygiene hooks. PR 4 (D-021) added ruff, mypy,
# eslint, and prettier — keeping local hooks aligned with the CI gates in
# .github/workflows/{backend,frontend}.yml. Local and CI must run the same
# tool versions; bump in lockstep.
#
# Install once after clone:
#   pip install pre-commit
#   pre-commit install
#
# After install, hooks run automatically on `git commit`. To run on the
# full repo on demand:
#   pre-commit run --all-files
#
# CI runs all of these as workflow gates as well (PR 3 + PR 4). The local
# hook is the fast first line; the CI run is the safety net for PRs opened
# from environments without pre-commit installed.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        # 500 KB cap. ROADMAP.md (~132 KB) and the golden_set ground_truth.md
        # files (~80-90 KB each) are well under. The audit's large-files scan
        # confirmed no legitimate tracked file approaches 500 KB today, so this
        # blocks accidents (a stray image, a .pyc, a checked-in .mp4 chunk)
        # without forcing per-file overrides on existing content.
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: ^backend/
        # Install the full backend runtime stack so mypy sees the real
        # stripe/jwt/anthropic/etc. types instead of falling back to
        # ignore_missing_imports. Cost: first pre-commit run is slow
        # (~30-60s while pre-commit builds its venv), subsequent runs
        # reuse the cached venv. Without this, local mypy is laxer than
        # the CI mypy run and contributors see "passes locally, fails CI."
        additional_dependencies:
          - "-r"
          - "backend/requirements.txt"

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        # `language: system` + npx so the version comes from frontend/node_modules
        # (locked by package-lock.json), not a stale pre-commit mirror.
        entry: bash -c 'cd frontend && npx eslint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && npx prettier --check'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|md|css)$
        pass_filenames: false
