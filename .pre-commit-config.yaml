# Pre-commit hooks for TEX v2.
#
# PR 1 ships only gitleaks (local secret prevention before commit). Lint,
# format, and hygiene hooks land in PR 4 alongside the linter configs that
# must match what CI runs.
#
# Install once after clone:
#   pip install pre-commit
#   pre-commit install
#
# After install, hooks run automatically on `git commit`. To run on the
# full repo on demand:
#   pre-commit run --all-files
#
# CI runs gitleaks separately as a workflow gate (added in PR 3). The local
# hook is the fast first line; the CI run is the safety net for PRs that
# skip the hook or are opened from environments without pre-commit installed.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
