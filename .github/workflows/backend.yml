# Backend CI — runs on PRs that touch backend/ or this workflow.
#
# Scope (PR 4 baseline): install deps, ruff lint (E/F/W/I/UP/B per
# backend/pyproject.toml), ruff format check, mypy typecheck (permissive
# baseline — strict=false), byte-compile every Python file.
#
# Tool versions pinned to match .pre-commit-config.yaml exactly:
#   ruff == 0.15.13
#   mypy == 2.1.0
# Bump in lockstep across this file, .pre-commit-config.yaml, and
# backend/pyproject.toml (header comment).
#
# All third-party actions pinned to major versions; Dependabot proposes
# weekly bumps in the github-actions ecosystem.

name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install lint tools
        run: pip install ruff==0.15.13 mypy==2.1.0

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy .

      - name: Byte-compile all backend modules
        run: python -m compileall -q .
