# Frontend CI — runs on PRs that touch frontend/ or this workflow.
#
# Scope (PR 4 baseline): npm ci, eslint (flat config, ESLint 9), prettier
# --check, tsc --noEmit (strict), next build.
#
# Tool versions are locked in frontend/package.json + package-lock.json
# (eslint, typescript-eslint, eslint-config-next, prettier). The eslint
# config lives at frontend/eslint.config.mjs and matches the local
# pre-commit hook in .pre-commit-config.yaml. Bump in lockstep.
#
# All third-party actions pinned to major versions; Dependabot proposes
# weekly bumps in the github-actions ecosystem.

name: frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Next.js production build
        run: npm run build
