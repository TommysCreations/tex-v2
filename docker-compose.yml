services:
  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8001:8000"]
    env_file: ./backend/.env
    volumes:
      - "./backend:/app"
      - "./golden_set:/golden_set:ro"
      # R11: EVAL_SCORES.md + EVAL_SCORES.jsonl are written at the repo root
      # from POST /admin/grading-sessions/complete. The repo root is mounted
      # rw so the eval ledger lands on the host filesystem ready to git-add.
      # Dev-only — production never grades.
      - "./:/repo:rw"
    depends_on: [redis]

  worker:
    build: ./backend
    command: celery -A tasks.celery_app worker -Q film_processing,report_generation,section_generation,notifications --concurrency=1 --loglevel=info
    env_file: ./backend/.env
    volumes: ["./backend:/app"]
    depends_on: [redis]

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    command: redis-server --appendonly yes
